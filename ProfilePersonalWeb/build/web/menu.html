<!DOCTYPE html>
<html>
<head>
    <title>Main Menu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #ffc0cb, #ffe4e1);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .menu-card {
        border-radius: 20px;
        background: #ffffff;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        text-align: center;
    }
    .menu-title {
        font-weight: 600;
        color: #F54927;
        margin-bottom: 10px;
    }

    .menu-subtitle {
        color: #6b7280;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }
    .menu-btn {
        display: block;
        padding: 15px;
        border-radius: 12px;
        font-weight: 500;
        text-decoration: none;
        margin-bottom: 15px;
        transition: all 0.3s ease;
    }
    .btn-register {
        background: #F54927;
        color: #ffffff;
    }

    .btn-register:hover {
        background: #ff6a4d;
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(245, 73, 39, 0.3);
    }
    .btn-view {
        background: #fff;
        color: #F54927;
        border: 2px solid #F54927;
    }

    .btn-view:hover {
        background: #F54927;
        color: #ffffff;
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(245, 73, 39, 0.3);
    }
    @media (max-width: 576px) {
        .menu-card {
            padding: 25px;
        }
    }
    </style>
</head>

<body>

    <div class="menu-card">
        <h1 class="menu-title">Main Menu</h1>
        <p class="menu-subtitle">Welcome to the Student Profile Management System</p>

        <a href="index.html" class="menu-btn btn-register">
            Register New Profile
        </a>

        <a href="ProfileServlet?action=view" class="menu-btn btn-view">
            View Registered Profile
        </a>
    </div>

</body>
</html>
