<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/all.min.css" rel="stylesheet">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #ffc0cb, #ffe4e1);
        min-height: 100vh;
    }

    .card {
        border: none;
        border-radius: 18px;
        background: #f4f7fb;
        box-shadow: 8px 8px 16px #d1d9e6,
                    -8px -8px 16px #ffffff;
        overflow: hidden;
    }
    .card-header {
        background: #F54927;
        color: #ffffff;
        border: none;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .form-label {
        font-size: 0.9rem;
        color: #374151;
    }
    .form-control {
        border-radius: 10px;
        border: none;
        padding: 12px;
        background: #f4f7fb;
        box-shadow: inset 4px 4px 8px #d1d9e6,
                    inset -4px -4px 8px #ffffff;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(245, 73, 39, 0.3);
        background: #ffffff;
    }
    ::placeholder {
        color: #9ca3af;
        font-size: 0.85rem;
    }
    .btn {
        border-radius: 10px;
        font-weight: 500;
        padding: 12px;
        transition: all 0.3s ease;
    }

    .btn-primary {
        background: #F54927;
        border: none;
    }

    .btn-primary:hover {
        background: #FFB6A8;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(245, 73, 39, 0.3);
    }

    .btn-outline-secondary {
        border: 2px solid #F54927;
        color: #F54927;
    }

    .btn-outline-secondary:hover {
        background: #FFB6A8;
        color: #ffffff;
    }
    .card-body {
        color: #1f2937;
    }
    @media (max-width: 768px) {
        .card {
            margin: 12px;
        }
    }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 650px;">
            <div class="card-header text-center py-3">
                <h3 class="mb-0"><i class="fas fa-user-plus"></i> Student Profile Registration</h3>
            </div>

            <div class="card-body p-4">
                <form action="ProfileServlet" method="POST">
                    <input type="hidden" name="action" value="add">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Student ID</label>
                            <input type="text" name="studentId" class="form-control" placeholder="e.g. 2024123456" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Ahmad Dani" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Programme</label>
                            <input type="text" name="program" class="form-control" placeholder="e.g. CS230" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="e.g. student@uitm.edu.my" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Hobbies</label>
                        <input type="text" name="hobbies" class="form-control" placeholder="e.g. Coding, Gaming, Reading">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Biography / Introduction</label>
                        <textarea name="bio" class="form-control" rows="4" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Save Profile Record
                        </button>
                        <a href="menu.html" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
